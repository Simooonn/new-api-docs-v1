<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- filename kept for upstream-sync compatibility; content is the Ace Hub brand mark -->
  <!-- AceHub v3 "aperture": three swirling blades around a center port, like a
       camera iris slightly open — the gateway as a controlled opening. -->
  <defs>
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="108" y1="80" x2="404" y2="432">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- blade: starts on the outer circle (r=160) at top, spirals in to r=100 -->
  <path d="M256 96 C 346 96, 393 261, 327 327" fill="none" stroke="url(#g)" stroke-width="44" stroke-linecap="round"/>
  <path d="M256 96 C 346 96, 393 261, 327 327" fill="none" stroke="url(#g)" stroke-width="44" stroke-linecap="round" transform="rotate(120 256 256)"/>
  <path d="M256 96 C 346 96, 393 261, 327 327" fill="none" stroke="url(#g)" stroke-width="44" stroke-linecap="round" transform="rotate(240 256 256)"/>
  <!-- center port -->
  <circle cx="256" cy="256" r="36" fill="url(#g)"/>
  <circle cx="256" cy="256" r="15" fill="#FFFFFF"/>
</svg>
